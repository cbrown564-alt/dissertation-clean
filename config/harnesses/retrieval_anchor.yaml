{
  "manifest_id": "retrieval_anchor.v1",
  "harness_id": "retrieval_anchor",
  "version": "1",
  "architecture_family": "retrieval_field_pipeline",
  "allowed_modules": ["candidate_span_retrieval", "anchor_prompt", "json_parse"],
  "prompt_versions": {"anchor": "retrieval_v1"},
  "schema_version": "1.0.0",
  "provider": "configurable",
  "model_registry_entry": "",
  "context_policy": {"input": "candidate_spans", "uses_document_interface": true},
  "output_contract": {"payload": "anchor_seizure_frequency"},
  "repair_policy": {"enabled": false, "invalid_json": "record_invalid_output"},
  "verifier_policy": {"enabled": false},
  "aggregation_policy": {"enabled": false},
  "budget_limits": {"llm_calls_per_row": 1},
  "gold_label_isolation": {"model_visible": false, "evaluation_only": true},
  "artifact_retention": {"payload": true, "candidate_spans": true, "provider_response": true}
}
