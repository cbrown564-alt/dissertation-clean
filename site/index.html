<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Epilepsy Extraction Research Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --paper:     #f4f0e2;
  --paper-2:   #ede9d8;
  --paper-3:   #e5e0cc;
  --ink:       #1a1411;
  --ink-body:  #2d2520;
  --muted:     #7a6a5c;
  --faint:     #b4a898;
  --rule-hvy:  #1a1411;
  --rule-mid:  #8a7a6a;
  --rule-lt:   #cfc4b4;
  --gold:      #8a6820;
  --gold-lt:   #c4a048;
  --gold-bg:   #f0e4bc;
  --red:       #8b1a1a;
  --green:     #1e5c30;
  --serif:     'Playfair Display', Georgia, serif;
  --body-f:    'Libre Baskerville', Georgia, serif;
  --mono:      'Courier Prime', 'Courier New', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--paper);
  color: var(--ink-body);
  font-family: var(--body-f);
  font-size: 15px;
  line-height: 1.72;
}

.page {
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 44px 96px;
}

/* ── Masthead ── */
.masthead { padding-top: 28px; animation: pressFade 0.8s ease both; }
@keyframes pressFade {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.mh-top {
  display: flex; justify-content: space-between; align-items: baseline;
  padding-bottom: 7px; border-bottom: 1px solid var(--rule-lt);
  font-size: 10.5px; font-family: var(--body-f);
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);
}
.mh-double {
  border-top: 4px solid var(--ink); border-bottom: 1.5px solid var(--ink);
  padding: 3px 0; margin: 6px 0 14px;
}
.mh-title {
  font-family: var(--serif); font-size: clamp(54px, 7.5vw, 96px);
  font-weight: 900; line-height: 0.9; text-align: center;
  letter-spacing: -0.03em; color: var(--ink); text-transform: uppercase;
  padding: 6px 0 10px;
}
.mh-rule-thin { border-top: 1px solid var(--ink); margin-bottom: 8px; }
.mh-sub {
  text-align: center; font-size: 12.5px; font-style: italic;
  color: var(--ink-body); letter-spacing: 0.03em; padding-bottom: 12px;
}
.mh-warning {
  width: calc(100% + 88px); margin-left: -44px;
  background: var(--ink); color: var(--paper);
  text-align: center; font-size: 10px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase; padding: 5px 0;
  font-family: var(--body-f);
}

/* ── Nav strip ── */
.nav-strip {
  display: flex; justify-content: center; align-items: center;
  gap: 4px; padding: 9px 0; border-bottom: 1px solid var(--rule-lt); margin-bottom: 36px;
}
.nav-strip a {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10.5px; font-family: var(--body-f);
  text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted);
  text-decoration: none; padding: 2px 9px; transition: color 0.12s;
}
.nav-strip a:hover { color: var(--ink); }
.nav-strip a svg { opacity: 0.55; transition: opacity 0.12s; }
.nav-strip a:hover svg { opacity: 1; }
.nav-sep { color: var(--rule-lt); font-size: 14px; line-height: 1; }

/* ── 3-col front ── */
.front {
  display: grid; grid-template-columns: 1fr 324px 212px;
  gap: 0; margin-bottom: 60px; animation: pressFade 0.6s ease 0.1s both;
}
.fcol { padding: 0 26px; }
.fcol:first-child { padding-left: 0; }
.fcol:last-child  { padding-right: 0; }
.fcol + .fcol { border-left: 1px solid var(--rule-lt); }

/* ── Article typography ── */
.kicker {
  font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--gold); font-family: var(--body-f); margin-bottom: 7px;
}
.hed-lg {
  font-family: var(--serif); font-size: 28px; font-weight: 800;
  line-height: 1.1; color: var(--ink); letter-spacing: -0.02em; margin-bottom: 10px;
}
.hed-md {
  font-family: var(--serif); font-size: 19px; font-weight: 700;
  line-height: 1.2; color: var(--ink); letter-spacing: -0.01em; margin-bottom: 8px;
}
.byline {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); border-bottom: 1px solid var(--rule-lt);
  padding-bottom: 7px; margin-bottom: 14px; font-family: var(--body-f);
}
.body-text { font-size: 14px; line-height: 1.78; color: var(--ink-body); }
.body-text p + p { margin-top: 11px; }
.body-text.drop-cap > p:first-child::first-letter {
  float: left; font-family: var(--serif); font-size: 66px;
  font-weight: 900; line-height: 0.82; padding-right: 9px; padding-top: 5px; color: var(--ink);
}
.pullquote {
  font-family: var(--serif); font-size: 16.5px; font-style: italic; line-height: 1.55;
  color: var(--ink); border-top: 2px solid var(--rule-hvy);
  border-bottom: 1px solid var(--rule-lt); padding: 13px 6px; margin: 20px 0;
}

/* ── Briefs + pip bars ── */
.brief { border-bottom: 1px solid var(--rule-lt); padding: 11px 0; }
.brief:last-child { border-bottom: none; }
.brief-label {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted); font-family: var(--body-f); margin-bottom: 3px;
}
.brief-value { font-family: var(--serif); font-size: 38px; font-weight: 900; line-height: 1; color: var(--ink); }
.brief-sub { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 3px; }
.brief-pips { display: flex; gap: 3px; margin-top: 8px; }
.pip { height: 4px; flex: 1; background: var(--rule-lt); border-radius: 2px; transition: background 0.3s; }

/* ── Compact ladder (front) ── */
.ladder-compact { list-style: none; }
.lc-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--rule-lt);
}
.lc-item:last-child { border-bottom: none; }
.lc-num {
  font-family: var(--serif); font-size: 22px; font-weight: 900; line-height: 1;
  color: var(--rule-lt); min-width: 22px; flex-shrink: 0; transition: color 0.2s;
}
.lc-item.live .lc-num { color: var(--ink); }
.lc-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
}
.lc-label {
  font-family: var(--serif); font-size: 13px; font-weight: 700; line-height: 1.3;
  color: var(--muted); margin-bottom: 2px; transition: color 0.2s;
}
.lc-item.live .lc-label { color: var(--ink); }
.lc-status { font-size: 11px; font-style: italic; color: var(--faint); font-family: var(--body-f); }
.lc-status.live-status { color: var(--gold); }

/* ── Section banners — 5 variants ── */

/* 1. Standard (Coverage, Models) */
.s-banner {
  display: flex; align-items: center; gap: 18px; margin: 60px 0 28px;
}
.s-banner::before, .s-banner::after { content: ''; flex: 1; border-top: 1px solid var(--rule-hvy); }
.s-banner-text {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--serif); font-size: 12.5px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink); white-space: nowrap;
}

/* 2. Inverted full-bleed (Architecture) */
.s-banner-inv {
  background: var(--ink); color: var(--paper);
  margin: 60px -44px 28px; padding: 15px 44px;
  display: flex; align-items: center; gap: 14px;
}
.s-banner-inv .s-banner-text { color: var(--paper); font-size: 14px; letter-spacing: 0.22em; }
.s-banner-inv .s-banner-dots { display: flex; gap: 7px; margin-left: auto; align-items: center; }

/* 3. Gold top-rule (Evidence Register) */
.s-banner-gold {
  margin: 60px 0 28px; padding: 10px 0;
  border-top: 3px solid var(--gold); border-bottom: 1px solid var(--rule-lt);
  display: flex; align-items: baseline; gap: 14px;
}
.s-banner-gold .s-banner-text { font-size: 15px; letter-spacing: 0.12em; color: var(--gold); }
.s-banner-gold .s-banner-count { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: auto; }

/* 4. Ledger double-rule (Budget) */
.s-banner-ledger {
  margin: 60px 0 28px; padding: 8px 0;
  border-top: 2px solid var(--ink); border-bottom: 2px solid var(--ink);
  display: flex; align-items: center; gap: 0;
}
.s-banner-ledger .s-banner-text { font-size: 14px; letter-spacing: 0.15em; }
.s-banner-ledger .s-banner-rule { flex: 1; border-top: 1px solid var(--rule-mid); margin: 0 18px; }

/* 5. Monospace left-accent (Harness) */
.s-banner-mono {
  margin: 60px 0 28px; padding: 10px 14px;
  background: var(--paper-2); border: 1px solid var(--rule-lt); border-left: 3px solid var(--ink);
  display: flex; align-items: center; gap: 12px;
}
.s-banner-mono .s-banner-text {
  font-family: var(--mono); font-size: 12px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
}

/* 6. Editorial italic (Research Docs) */
.s-banner-ed {
  margin: 60px 0 28px; text-align: center;
  border-top: 1px solid var(--rule-lt); padding-top: 18px;
}
.s-banner-ed .s-banner-text {
  display: block; font-family: var(--serif); font-size: 24px; font-weight: 700;
  font-style: italic; letter-spacing: -0.01em; text-transform: none; color: var(--ink);
}
.s-banner-ed .s-banner-sub {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  margin-top: 5px; font-size: 11px; font-family: var(--body-f);
  color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
}

/* ── Architecture ladder infographic ── */
.ladder-infographic {
  position: relative; display: flex; padding: 28px 0 44px; align-items: flex-start;
}
.ladder-infographic::before {
  content: ''; position: absolute; top: 49px;
  left: calc(100% / 10); right: calc(100% / 10);
  height: 1px; background: var(--rule-mid);
}
.lnode {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  text-align: center; position: relative; z-index: 1; padding: 0 8px;
}
.lnode-ring {
  width: 46px; height: 46px; border-radius: 50%;
  border: 2px solid var(--rule-lt); background: var(--paper);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 17px; font-weight: 800; color: var(--faint);
  margin-bottom: 12px; transition: all 0.25s;
  box-shadow: 0 0 0 4px var(--paper);
}
.lnode-name {
  font-family: var(--serif); font-size: 11.5px; font-weight: 700;
  line-height: 1.3; color: var(--muted); margin-bottom: 6px; transition: color 0.2s;
}
.lnode.live .lnode-name { color: var(--ink); }
.lnode-harnesses { font-family: var(--mono); font-size: 9px; color: var(--faint); line-height: 1.65; }
.lnode.live .lnode-harnesses { color: var(--muted); }
.lnode-runs { font-family: var(--body-f); font-size: 11px; font-style: italic; margin-top: 7px; }
.lnode-pending { font-family: var(--body-f); font-size: 11px; font-style: italic; color: var(--rule-lt); margin-top: 7px; }
.lnode-desc {
  font-family: var(--body-f); font-size: 9.5px; color: var(--muted); line-height: 1.55;
  margin-top: 9px; font-style: italic; max-width: 115px;
}

/* ── Evidence register cards (collapsed/expand) ── */
.register-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 18px;
}
.run-card {
  border: 1px solid var(--rule-lt); background: var(--paper);
  transition: border-color 0.15s, box-shadow 0.15s;
  cursor: pointer; overflow: hidden;
}
.run-card:hover { border-color: var(--rule-mid); box-shadow: 0 2px 8px rgba(26,20,17,0.06); }
.rc-arch-bar { height: 3px; width: 100%; }
.rc-summary { padding: 14px 17px 12px; }
.rc-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 8px; margin-bottom: 3px;
}
.rc-id { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--ink); word-break: break-all; }
.rc-family {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.11em;
  text-transform: uppercase; font-family: var(--body-f); margin-bottom: 6px;
}
.rc-accuracy { display: flex; align-items: baseline; gap: 6px; margin-top: 8px; margin-bottom: 2px; }
.rc-acc-value { font-family: var(--serif); font-size: 26px; font-weight: 900; line-height: 1; color: var(--ink); }
.rc-acc-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted); font-family: var(--body-f); line-height: 1.4;
}

/* Coverage dot grid in cards */
.rc-dotgrid { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px; }
.dg-item { display: flex; flex-direction: column; align-items: center; gap: 3px; width: 26px; }
.dg-dot { width: 20px; height: 20px; border-radius: 3px; }
.dg-dot-y { background: var(--green); }
.dg-dot-p { background: var(--gold-lt); }
.dg-dot-n { background: var(--paper-3); border: 1px solid var(--rule-lt); }
.dg-label { font-family: var(--mono); font-size: 7px; color: var(--muted); text-transform: uppercase; }

.rc-expand-hint {
  font-size: 9.5px; color: var(--faint); font-family: var(--body-f);
  letter-spacing: 0.06em; text-transform: uppercase; margin-top: 10px;
  display: flex; align-items: center; gap: 4px;
}
.chevron { display: inline-block; transition: transform 0.2s; line-height: 1; }
.run-card.expanded .chevron { transform: rotate(180deg); }

.rc-detail {
  display: none; border-top: 1px solid var(--rule-lt); padding: 12px 17px 14px;
}
.run-card.expanded .rc-detail { display: block; }
.rc-rule { border-top: 1px solid var(--rule-lt); margin: 9px 0; }
.rc-row {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 12px; margin-bottom: 4px; gap: 8px;
}
.rc-lbl {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--muted); flex-shrink: 0;
}
.rc-val { font-family: var(--mono); font-size: 11.5px; color: var(--ink-body); text-align: right; word-break: break-all; }

/* ── Status stamps ── */
.stamp {
  display: inline-block; font-family: var(--mono); font-size: 9px; font-weight: 700;
  letter-spacing: 0.07em; text-transform: uppercase; padding: 2px 7px;
  border: 1px solid; white-space: nowrap; flex-shrink: 0;
}
.s-smoke      { color: var(--muted);   border-color: var(--rule-lt); }
.s-canonical  { color: var(--gold);    border-color: var(--gold); }
.s-supporting { color: var(--ink);     border-color: var(--ink); }
.s-archive    { color: var(--faint);   border-color: var(--rule-lt); }
.s-tier-frontier      { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.s-tier-medium        { color: var(--muted);    border-color: var(--rule-mid); }
.s-tier-small         { color: var(--faint);    border-color: var(--rule-lt); }
.s-tier-open_frontier { color: var(--green);    border-color: var(--green); }
.s-tier-open_small    { color: var(--muted);    border-color: var(--rule-lt); }

/* ── Coverage heatmap ── */
.cov-wrap { overflow-x: auto; }
.cov-heatmap {
  width: 100%; border-collapse: collapse; font-family: var(--body-f); font-size: 13px;
}
.cov-heatmap th {
  font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--muted); padding: 7px 4px; border-bottom: 2px solid var(--ink);
  text-align: center; white-space: nowrap;
}
.cov-heatmap th.col-l { text-align: left; padding-left: 8px; }
.cov-heatmap td { padding: 4px; border-bottom: 1px solid var(--rule-lt); vertical-align: middle; }
.cov-heatmap td.col-id { font-family: var(--mono); font-size: 10px; padding: 4px 8px; white-space: nowrap; }
.cov-heatmap td.col-arch { font-size: 9.5px; padding: 4px 8px; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
.cov-heatmap tr:hover td { background: var(--paper-2); }
.cv-cell {
  width: 30px; height: 22px; border-radius: 3px; margin: 0 auto;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
}
.cv-y { background: var(--green);    color: white; }
.cv-p { background: var(--gold-lt);  color: var(--ink); }
.cv-n { background: var(--paper-3);  color: var(--faint); border: 1px solid var(--rule-lt); }
.cv-x { background: transparent;     color: var(--rule-lt); }
.cov-legend {
  display: flex; align-items: center; gap: 20px; margin-top: 14px; font-size: 11px; color: var(--muted);
}
.cov-leg-item { display: flex; align-items: center; gap: 7px; }
.cov-leg-sw { width: 14px; height: 14px; border-radius: 2px; }

/* ── Budget & token bars ── */
.data-table-wrap { overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; font-family: var(--body-f); font-size: 13px; }
.data-table th {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
  color: var(--muted); padding: 8px 12px; border-bottom: 2px solid var(--ink);
  text-align: left; white-space: nowrap;
}
.data-table td {
  padding: 8px 12px; border-bottom: 1px solid var(--rule-lt);
  font-family: var(--mono); font-size: 12px; vertical-align: middle;
}
.data-table tr:hover td { background: var(--paper-2); }
.tok-cell { min-width: 140px; }
.tok-wrap { display: flex; align-items: center; gap: 8px; }
.tok-track {
  flex: 1; height: 5px; background: var(--paper-3); border-radius: 2px;
  overflow: hidden; min-width: 50px;
}
.tok-fill { height: 100%; border-radius: 2px; background: var(--ink); }
.tok-fill-lat { background: var(--gold); }
.tok-val { font-family: var(--mono); font-size: 10.5px; color: var(--ink-body); white-space: nowrap; min-width: 50px; text-align: right; }

/* ── Model registry ── */
.provider-hdg {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); border-bottom: 1px solid var(--rule-lt); padding-bottom: 7px; margin: 28px 0 13px;
}
.provider-hdg:first-of-type { margin-top: 0; }
.model-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
.model-card { border: 1px solid var(--rule-lt); padding: 14px 17px; transition: border-color 0.15s; }
.model-card:hover { border-color: var(--rule-mid); }
.mc-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
.mc-name { font-family: var(--body-f); font-size: 14px; font-weight: 700; color: var(--ink); line-height: 1.3; }
.mc-id { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 8px; }
.mc-note { font-size: 12px; font-style: italic; color: var(--muted); line-height: 1.5; }
.mc-costs { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 8px; }

/* ── Research documents ── */
.doc-card { border-bottom: 1px solid var(--rule-lt); }
.doc-card:first-child { border-top: 1px solid var(--rule-lt); }
.doc-trigger {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 15px 0; cursor: pointer; user-select: none; gap: 16px; transition: opacity 0.15s;
}
.doc-trigger:hover { opacity: 0.75; }
.doc-hed { font-family: var(--serif); font-size: 17px; font-weight: 700; color: var(--ink); }
.doc-meta {
  font-size: 10.5px; font-family: var(--body-f); color: var(--muted);
  white-space: nowrap; text-transform: uppercase; letter-spacing: 0.07em; flex-shrink: 0;
}
.doc-body { display: none; padding-bottom: 22px; }
.doc-card.open .doc-body { display: block; }
.doc-text {
  font-family: var(--body-f); font-size: 13px; line-height: 1.82; color: var(--ink-body);
  white-space: pre-wrap; word-break: break-word; max-height: 520px; overflow-y: auto; padding-right: 6px;
}
.doc-text::-webkit-scrollbar { width: 3px; }
.doc-text::-webkit-scrollbar-thumb { background: var(--rule-lt); }

/* ── Empty / error / loading ── */
.empty { padding: 36px 0; color: var(--muted); font-style: italic; font-size: 13px; text-align: center; }
#loading {
  text-align: center; padding: 140px 0; font-family: var(--serif);
  font-size: 20px; font-style: italic; color: var(--muted); letter-spacing: 0.04em;
}
#err { display: none; max-width: 540px; margin: 80px auto; text-align: center; }
#err h2 { font-family: var(--serif); font-size: 30px; color: var(--ink); margin-bottom: 16px; }
#err p { color: var(--muted); margin-bottom: 14px; line-height: 1.7; font-size: 14px; }
#err pre {
  background: var(--paper-2); border: 1px solid var(--rule-lt); padding: 16px;
  font-family: var(--mono); font-size: 12px; color: var(--ink); text-align: left;
}

/* ── Tabs ── */
.tab-nav { display:flex; gap:0; border-bottom:2px solid var(--ink); margin-bottom:24px; }
.tab-btn {
  font-family:var(--body-f); font-size:10px; font-weight:700; letter-spacing:0.1em;
  text-transform:uppercase; padding:8px 18px; background:none; border:none;
  border-bottom:3px solid transparent; margin-bottom:-2px; cursor:pointer;
  color:var(--muted); transition:color 0.15s, border-color 0.15s;
}
.tab-btn:hover { color:var(--ink); }
.tab-btn.active { color:var(--ink); border-bottom-color:var(--ink); }
.tab-pane { display:none; }
.tab-pane.active { display:block; }

/* ── Family summary cards ── */
.fam-grid {
  display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:12px;
}
.fam-card {
  border:1px solid var(--rule-lt); background:var(--paper);
  transition:border-color 0.15s, box-shadow 0.15s; overflow:hidden;
}
.fam-card:hover { border-color:var(--rule-mid); box-shadow:0 2px 8px rgba(26,20,17,0.06); }
.fam-card-accent { height:4px; }
.fam-card-body { padding:14px 14px 10px; }
.fam-step-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.fam-step-circle {
  width:26px; height:26px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-family:var(--serif); font-size:13px; font-weight:900;
  color:white; flex-shrink:0;
}
.fam-name { font-family:var(--serif); font-size:13px; font-weight:700; color:var(--ink); line-height:1.25; }
.fam-stats { display:flex; gap:12px; margin:10px 0 8px; }
.fam-stat { flex:1; }
.fam-stat-val { font-family:var(--serif); font-size:22px; font-weight:900; line-height:1; color:var(--ink); }
.fam-stat-lbl { font-size:8.5px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); font-family:var(--body-f); margin-top:2px; }
.fam-mini-grid { display:flex; gap:3px; flex-wrap:wrap; margin:8px 0 4px; }
.fam-mini-dot { width:16px; height:16px; border-radius:2px; }
.fam-footer {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 14px; border-top:1px solid var(--rule-lt);
  font-size:9px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--muted); cursor:pointer; user-select:none; transition:background 0.12s;
}
.fam-footer:hover { background:var(--paper-2); }
.fam-drill { border-top:1px solid var(--rule-lt); display:none; }
.fam-card.open .fam-drill { display:block; }
.fam-run-row {
  display:grid; grid-template-columns:1fr auto auto; align-items:center;
  gap:8px; padding:7px 14px; border-bottom:1px solid var(--rule-lt); font-size:11px;
}
.fam-run-row:last-child { border-bottom:none; }
.fam-run-id { font-family:var(--mono); font-size:10px; color:var(--ink-body); word-break:break-all; }
.fam-run-acc { font-family:var(--serif); font-size:14px; font-weight:800; color:var(--ink); white-space:nowrap; }
.fam-no-runs { padding:16px 14px; font-size:11px; font-style:italic; color:var(--muted); }

/* ── Responsive ── */
@media (max-width: 960px) {
  .page { padding: 0 20px 60px; }
  .mh-title { font-size: 40px; }
  .mh-warning { width: calc(100% + 40px); margin-left: -20px; }
  .front { grid-template-columns: 1fr; }
  .fcol + .fcol { border-left: none; border-top: 1px solid var(--rule-lt); padding-left: 0; padding-top: 26px; margin-top: 26px; }
  .model-grid { grid-template-columns: 1fr; }
  .ladder-infographic { flex-wrap: wrap; gap: 20px; }
  .ladder-infographic::before { display: none; }
  .s-banner-inv { margin: 60px -20px 28px; padding: 15px 20px; }
  .fam-grid { grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 600px) { .fam-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="page">
  <div id="loading">Composing edition&hellip;</div>
  <div id="err">
    <h2>Edition not found</h2>
    <p>Build the data file first, then serve this directory:</p>
    <pre>python scripts/build_cockpit_data.py
cd site
python -m http.server 8000</pre>
    <p style="font-size:11px;color:var(--faint)">Opening as a file:// URL blocks fetch requests.</p>
  </div>
  <div id="cockpit" style="display:none"></div>
</div>

<script>
'use strict';

/* ── Architecture colour system ─────────────────────── */

const COLOUR_MAP = {
  teal:   { fg: '#1a6b72', bg: '#ddf1f3' },
  blue:   { fg: '#1c3a6e', bg: '#e3eaf6' },
  purple: { fg: '#5c2a7a', bg: '#f0eaf7' },
  amber:  { fg: '#8a5f18', bg: '#f4ecdc' },
  green:  { fg: '#1e5c30', bg: '#e4f0e7' },
};

let ARCH_FG = {};
let ARCH_BG = {};

function initColors(ladder) {
  for (const step of (ladder ?? [])) {
    const c = COLOUR_MAP[step.colour] ?? { fg: '#7a6a5c', bg: '#ede9d8' };
    ARCH_FG[step.family] = c.fg;
    ARCH_BG[step.family] = c.bg;
  }
}

function fg(family) { return ARCH_FG[family] ?? '#7a6a5c'; }

/* ── SVG icons ──────────────────────────────────────── */

const IC = {
  ladder:  `<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="3" y1="1" x2="3" y2="12"/><line x1="10" y1="1" x2="10" y2="12"/><line x1="3" y1="3" x2="10" y2="3"/><line x1="3" y1="6.5" x2="10" y2="6.5"/><line x1="3" y1="10" x2="10" y2="10"/></svg>`,
  archive: `<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3.5" width="11" height="8" rx="0.5"/><path d="M1 3.5L2 1h9l1 2.5"/><line x1="4.5" y1="7" x2="8.5" y2="7"/></svg>`,
  grid:    `<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="1" y="1" width="4.5" height="4.5" rx="0.5"/><rect x="7.5" y="1" width="4.5" height="4.5" rx="0.5"/><rect x="1" y="7.5" width="4.5" height="4.5" rx="0.5"/><rect x="7.5" y="7.5" width="4.5" height="4.5" rx="0.5"/></svg>`,
  chart:   `<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><line x1="1.5" y1="11.5" x2="11.5" y2="11.5"/><rect x="2" y="7" width="2.5" height="4.5"/><rect x="5.25" y="4" width="2.5" height="7.5"/><rect x="8.5" y="1.5" width="2.5" height="10"/></svg>`,
  circuit: `<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="2.5" cy="6.5" r="1.2"/><circle cx="10.5" cy="6.5" r="1.2"/><circle cx="6.5" cy="2.5" r="1.2"/><circle cx="6.5" cy="10.5" r="1.2"/><line x1="3.7" y1="6.5" x2="5.3" y2="6.5"/><line x1="7.7" y1="6.5" x2="9.3" y2="6.5"/><line x1="6.5" y1="3.7" x2="6.5" y2="5.3"/><line x1="6.5" y1="7.7" x2="6.5" y2="9.3"/></svg>`,
  stack:   `<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="6.5" cy="3" rx="5" ry="1.7"/><path d="M1.5 3v3c0 .94 2.24 1.7 5 1.7s5-.76 5-1.7V3"/><path d="M1.5 6v3c0 .94 2.24 1.7 5 1.7s5-.76 5-1.7V6"/></svg>`,
  book:    `<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 11V2.5S5 1.5 2.5 1.5H1v9h1.5C5 10.5 6.5 11 6.5 11z"/><path d="M6.5 11V2.5S8 1.5 10.5 1.5H12v9h-1.5C8 10.5 6.5 11 6.5 11z"/></svg>`,
};

/* ── Utilities ──────────────────────────────────────── */

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function fmtDateLong(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }); }
  catch { return iso; }
}
function fmtDateShort(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
  catch { return iso; }
}
function fmtPct(n) {
  if (n == null || n === '') return '—';
  const v = Number(n); if (isNaN(v)) return '—';
  return (v * 100).toFixed(1) + '%';
}
function fmtNum(n) {
  if (n == null || n === '') return '—';
  const v = Number(n); if (isNaN(v) || v === 0) return '—';
  return v.toLocaleString('en-GB');
}
function statusStamp(s) {
  const map = { canonical: 's-canonical', supporting: 's-supporting', archive: 's-archive', smoke: 's-smoke' };
  return `<span class="stamp ${map[s] ?? 's-smoke'}">${esc(s || '—')}</span>`;
}
function familyLabel(f) {
  return {
    clinical_nlp_baseline: 'Clinical NLP Baseline',
    direct: 'Direct LLM Baseline',
    retrieval: 'Retrieval + Fields',
    clines_inspired_modular: 'CLINES-Inspired Modular',
    anchor: 'Seizure-Frequency Anchor',
  }[f] ?? (f ? esc(f) : '—');
}
function extractMd(text, heading) {
  const re = new RegExp(`##\\s+${heading}[^\\n]*\\n([\\s\\S]+?)(?=\\n##|$)`, 'i');
  const m = text.match(re);
  return m ? m[1].trim() : '';
}

/* ── Global tab switch ──────────────────────────────── */

function switchTab(containerId, tabName) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabName));
  el.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.dataset.tab === tabName));
}

/* ── Masthead ───────────────────────────────────────── */

function renderMasthead(data) {
  const meta  = data.run_meta ?? {};
  const nDisp = meta.display_total ?? 0;
  const nPrim = meta.primary_total ?? 0;
  const nMat  = meta.matrix_total  ?? 0;
  const gen   = fmtDateLong(data.generated_at);
  const year  = data.generated_at ? new Date(data.generated_at).getFullYear() : new Date().getFullYear();
  return `
<header class="masthead">
  <div class="mh-top">
    <span>Vol.&nbsp;I &nbsp;&middot;&nbsp; Dissertation Research Evidence</span>
    <span>${nPrim} primary &middot; ${nMat} matrix run records</span>
    <span>Generated ${gen}</span>
  </div>
  <div class="mh-double"></div>
  <h1 class="mh-title">The Epilepsy Extraction<br>Research Cockpit</h1>
  <div class="mh-rule-thin"></div>
  <div class="mh-sub">CLINES-Inspired Clinical NLP Pipeline &nbsp;&bull;&nbsp; Architecture Ladder &nbsp;&bull;&nbsp; Model Registry &nbsp;&bull;&nbsp; Results Register &nbsp;&bull;&nbsp; ${year}</div>
  <div class="mh-warning">&#9888;&ensp;Synthetic Data Only &mdash; Not for Clinical Deployment&ensp;&#9888;</div>
</header>

<nav class="nav-strip">
  <a href="#front">${IC.grid} Overview</a><span class="nav-sep">&middot;</span>
  <a href="#ladder">${IC.ladder} Architecture</a><span class="nav-sep">&middot;</span>
  <a href="#register">${IC.archive} Results Register</a><span class="nav-sep">&middot;</span>
  <a href="#result-tables">${IC.chart} Result Tables</a><span class="nav-sep">&middot;</span>
  <a href="#models">${IC.stack} Models</a><span class="nav-sep">&middot;</span>
  <a href="#docs">${IC.book} Documents</a>
</nav>`;
}

/* ── Front page ─────────────────────────────────────── */

function renderFront(data) {
  const rq     = data.docs?.research_question ?? '';
  const ladder = data.architecture_ladder ?? [];
  const meta   = data.run_meta ?? {};
  const famSum = data.family_summaries ?? {};

  const primaryQ = extractMd(rq, 'Primary Question') ||
    'How do CLINES-inspired modular architecture, clinical extraction baselines, and model capacity affect clinical correctness, evidence support, auditability, cost, latency, token use, and harness complexity in epilepsy clinic-letter extraction?';
  const studyPos = extractMd(rq, 'Study Position');
  const bodyP2 = studyPos.split('\n').filter(l => l.trim()).slice(0, 3).join(' ') ||
    'The project evaluates architecture as an empirical variable. A CLINES-inspired modular pipeline is the main proposed architecture, tested through ablations and compared against direct LLM prompting and clinical NLP-style baselines.';
  const h1raw = rq.match(/###\s+H1[^\n]*\n([\s\S]+?)(?=\n###|\n##|$)/i);
  const pq = h1raw ? h1raw[1].trim().split(/\.\s/)[0] + '.' :
    'A CLINES-inspired architecture may improve evidence support, status handling, temporality, and auditability compared with direct prompting.';

  const nDisplay  = meta.display_total ?? 0;
  const nMatrix   = meta.matrix_total  ?? 0;
  const nFamilies = ladder.filter(s => (famSum[s.family] ?? {}).has_data).length;
  const nModels   = (data.model_registry?.frozen?.models ?? []).length;
  const nFields   = (data.field_families ?? []).length;

  const colLead = `
<div class="fcol">
  <div class="kicker">Lead Research</div>
  <h2 class="hed-lg">Architecture as an Empirical Variable in Epilepsy Extraction</h2>
  <div class="byline">Dissertation Research &nbsp;&middot;&nbsp; Clinical NLP Pipeline Study &nbsp;&middot;&nbsp; ${new Date().getFullYear()}</div>
  <div class="body-text drop-cap">
    <p>${esc(primaryQ)}</p>
    <p>${esc(bodyP2)}</p>
  </div>
  <div class="pullquote">${esc(pq)}</div>
  <div class="body-text">
    <p>Five architecture rungs are under evaluation, from deterministic clinical NLP baselines through to a CLINES-inspired modular pipeline with assertion handling, temporality resolution, evidence verification, and cross-chunk aggregation. Results are reported by field family, not only in aggregate.</p>
  </div>
</div>`;

  const ladderItems = ladder.map(step => {
    const fs   = famSum[step.family] ?? {};
    const live = fs.has_data === true;
    const dotColor = fg(step.family);
    const rc   = fs.run_counts ?? {};
    const nonSmoke = (rc.supporting ?? 0) + (rc.archive ?? 0);
    const statusText = live
      ? `${nonSmoke} non-smoke run${nonSmoke !== 1 ? 's' : ''}`
      : 'pending';
    return `<li class="lc-item${live ? ' live' : ''}">
      <span class="lc-num">${step.step}</span>
      <div class="lc-dot" style="background:${dotColor};opacity:${live ? '1' : '0.25'}"></div>
      <div style="flex:1">
        <div class="lc-label">${esc(step.label)}</div>
        <div class="lc-status${live ? ' live-status' : ''}">${statusText}</div>
      </div>
    </li>`;
  }).join('');

  const colMid = `
<div class="fcol">
  <div class="kicker">Architecture Ladder</div>
  <h3 class="hed-md">Five Rungs from Clinical NLP to Modular Pipeline</h3>
  <div class="byline">Harness Families &nbsp;&middot;&nbsp; Current Status</div>
  <ul class="ladder-compact">${ladderItems}</ul>
</div>`;

  // Pip bars for families (one pip per ladder step, coloured by arch, filled if has supporting runs)
  const pipRuns = ladder.map(step => {
    const fs = famSum[step.family] ?? {};
    const rc = fs.run_counts ?? {};
    const hasSupporting = (rc.supporting ?? 0) > 0;
    const hasAny = fs.has_data === true;
    const col = fg(step.family);
    if (hasSupporting) return `<div class="pip" style="background:${col}"></div>`;
    if (hasAny)        return `<div class="pip" style="background:${col};opacity:0.45"></div>`;
    return `<div class="pip"></div>`;
  }).join('');

  const colBriefs = `
<div class="fcol">
  <div class="kicker">At a Glance</div>
  <div class="brief">
    <div class="brief-label">Primary Runs (non-smoke)</div>
    <div class="brief-value">${nDisplay}</div>
    <div class="brief-sub">in results register</div>
  </div>
  <div class="brief">
    <div class="brief-label">Matrix Data Points</div>
    <div class="brief-value">${nMatrix}</div>
    <div class="brief-sub">model &times; harness comparisons</div>
  </div>
  <div class="brief">
    <div class="brief-label">Architecture Families</div>
    <div class="brief-value">${nFamilies}</div>
    <div class="brief-sub">${nFamilies} of ${ladder.length} rungs with data</div>
    <div class="brief-pips">${pipRuns}</div>
  </div>
  <div class="brief">
    <div class="brief-label">Frozen Models</div>
    <div class="brief-value">${nModels}</div>
    <div class="brief-sub">in registry</div>
  </div>
</div>`;

  return `<div class="front" id="front">${colLead}${colMid}${colBriefs}</div>`;
}

/* ── Architecture Ladder ────────────────────────────── */

function renderLadder(data) {
  const ladder = data.architecture_ladder ?? [];
  const famSum = data.family_summaries ?? {};

  const dots = ladder.map(step => {
    const fs   = famSum[step.family] ?? {};
    const live = fs.has_data === true;
    return `<div title="${esc(step.label)}" style="width:9px;height:9px;border-radius:50%;background:${fg(step.family)};opacity:${live ? '1' : '0.22'}"></div>`;
  }).join('');

  const nodes = ladder.map(step => {
    const fs     = famSum[step.family] ?? {};
    const live   = fs.has_data === true;
    const archFg = fg(step.family);
    const rc     = fs.run_counts ?? {};
    const nonSmoke = (rc.supporting ?? 0) + (rc.archive ?? 0);
    const nMatrix  = rc.matrix ?? 0;
    const bestAcc  = fs.best_accuracy;
    const ringStyle = live
      ? `background:${archFg};border-color:${archFg};color:white;box-shadow:0 0 0 4px var(--paper),0 0 0 6px ${archFg}44`
      : '';
    let runsEl = '';
    if (live) {
      const accStr = bestAcc != null ? ` &mdash; best ${(Number(bestAcc) * 100).toFixed(0)}%` : '';
      const matStr = nMatrix > 0 ? ` + ${nMatrix} matrix` : '';
      runsEl = `<div class="lnode-runs" style="color:${archFg}">${nonSmoke} run${nonSmoke !== 1 ? 's' : ''}${matStr}${accStr}</div>`;
    } else {
      runsEl = `<div class="lnode-pending">pending</div>`;
    }
    const harnesses = fs.harnesses ?? step.harnesses ?? [];
    return `<div class="lnode${live ? ' live' : ''}">
      <div class="lnode-ring" style="${ringStyle}">${step.step}</div>
      <div class="lnode-name">${esc(step.label)}</div>
      <div class="lnode-harnesses">${esc(harnesses.join('\n'))}</div>
      ${runsEl}
      ${step.description ? `<div class="lnode-desc">${esc(step.description)}</div>` : ''}
    </div>`;
  }).join('');

  return `
<div class="s-banner-inv" id="ladder">
  <span style="opacity:0.55">${IC.ladder}</span>
  <span class="s-banner-text">Architecture Ladder</span>
  <div class="s-banner-dots">${dots}</div>
</div>
<div class="ladder-infographic">${nodes || '<div class="empty">No ladder data.</div>'}</div>`;
}

/* ── Family Register ────────────────────────────────── */

function renderFamilyRegister(data) {
  const ladder  = data.architecture_ladder ?? [];
  const famSum  = data.family_summaries ?? {};
  const display = data.display_register ?? [];

  const ABBR = {
    seizure_frequency: 'SF', seizure_classification: 'SC', epilepsy_classification: 'EC',
    current_medications: 'med', investigations: 'inv', associated_symptoms: 'sym',
    comorbidities: 'com', rescue_medication: 'res', other_therapies: 'oth',
  };
  const fields = data.field_families ?? Object.keys(ABBR);

  const cards = ladder.map(step => {
    const fam    = step.family;
    const fs     = famSum[fam] ?? {};
    const archFg = fg(fam);
    const rc     = fs.run_counts ?? {};
    const nonSmoke = (rc.supporting ?? 0) + (rc.archive ?? 0);
    const bestAcc  = fs.best_accuracy;
    const accStr   = bestAcc != null ? (Number(bestAcc) * 100).toFixed(0) + '%' : '—';
    const aggCov   = fs.aggregate_field_coverage ?? {};

    const miniDots = fields.map(f => {
      const v = aggCov[f];
      let bg = '#e5e0cc';
      if (v === 'implemented') bg = '#1e5c30';
      else if (v === 'partial') bg = '#c4a048';
      return `<div class="fam-mini-dot" title="${esc(f)}: ${esc(v ?? 'none')}" style="background:${bg}"></div>`;
    }).join('');

    const footerLabel = nonSmoke > 0
      ? `${nonSmoke} non-smoke run${nonSmoke !== 1 ? 's' : ''} &middot; click to expand`
      : 'No primary runs yet';

    const famRuns = display.filter(r => r.architecture_family === fam);
    const drillRows = famRuns.length > 0
      ? famRuns.map(r => {
          const acc = r.metrics?.exact_label_accuracy;
          const accEl = acc != null
            ? `<span class="fam-run-acc">${(Number(acc) * 100).toFixed(0)}%</span>`
            : `<span class="fam-run-acc" style="color:var(--faint)">—</span>`;
          const shortId = String(r.run_id ?? '').length > 40
            ? String(r.run_id).slice(0, 37) + '...'
            : String(r.run_id ?? '');
          return `<div class="fam-run-row">
            <span class="fam-run-id">${esc(shortId)}</span>
            ${statusStamp(r.status)}
            ${accEl}
          </div>`;
        }).join('')
      : `<div class="fam-no-runs">No non-smoke primary runs for this architecture yet.</div>`;

    return `<div class="fam-card">
      <div class="fam-card-accent" style="background:${archFg}"></div>
      <div class="fam-card-body">
        <div class="fam-step-row">
          <div class="fam-step-circle" style="background:${archFg}">${step.step}</div>
          <div class="fam-name">${esc(step.label)}</div>
        </div>
        <div class="fam-stats">
          <div class="fam-stat">
            <div class="fam-stat-val">${esc(accStr)}</div>
            <div class="fam-stat-lbl">Best Accuracy</div>
          </div>
          <div class="fam-stat">
            <div class="fam-stat-val">${nonSmoke}</div>
            <div class="fam-stat-lbl">Runs</div>
          </div>
        </div>
        <div class="fam-mini-grid">${miniDots}</div>
      </div>
      <div class="fam-footer" onclick="this.closest('.fam-card').classList.toggle('open')">
        <span>${footerLabel}</span>
        <span class="chevron">&#8964;</span>
      </div>
      <div class="fam-drill">${drillRows}</div>
    </div>`;
  }).join('');

  return `
<div class="s-banner-gold" id="register">
  <span class="s-banner-text">${IC.archive}&nbsp; Results Register</span>
  <span class="s-banner-count">${display.length} non-smoke primary run${display.length !== 1 ? 's' : ''}</span>
</div>
<div class="fam-grid">${cards}</div>`;
}

/* ── Result Tables ──────────────────────────────────── */

function renderResultTables(data) {
  const tables  = data.result_tables ?? {};
  const ladder  = data.architecture_ladder ?? [];
  const display = data.display_register ?? [];

  // Build harness -> family map from ladder step harness lists
  const harnessToFamily = {};
  for (const step of ladder) {
    for (const h of (step.harnesses ?? [])) {
      harnessToFamily[h] = step.family;
    }
  }
  // Also enrich from display register
  for (const r of display) {
    if (r.harness && r.architecture_family) {
      harnessToFamily[r.harness] = r.architecture_family;
    }
  }

  function tokBar(val, max, latency = false) {
    const v = Number(val);
    if (!val || isNaN(v) || v === 0) return `<div class="tok-val">—</div>`;
    const pct = Math.max(4, (v / max) * 100).toFixed(1);
    const cls = latency ? 'tok-fill tok-fill-lat' : 'tok-fill';
    return `<div class="tok-wrap">
      <div class="tok-track"><div class="${cls}" style="width:${pct}%"></div></div>
      <div class="tok-val">${v.toLocaleString('en-GB')}</div>
    </div>`;
  }

  /* ── Tab 1: Field-Level Correctness ── */
  function renderFieldAccuracy() {
    const t = tables.field_level_correctness;
    if (!t || !t.rows?.length) return `<div class="empty">No field_level_correctness.csv data found.</div>`;
    const SHOW_COLS = ['harness', 'field_family', 'n', 'exact_label_accuracy', 'monthly_rate_accuracy_tolerance_15pct', 'pragmatic_macro_f1', 'purist_macro_f1'];
    const COL_LABELS = {
      harness: 'Harness', field_family: 'Field Family', n: 'N',
      exact_label_accuracy: 'Exact Acc', monthly_rate_accuracy_tolerance_15pct: 'Monthly Rate Acc (±15%)',
      pragmatic_macro_f1: 'Pragmatic F1', purist_macro_f1: 'Purist F1',
    };
    // Sort by field_family then harness
    const sorted = [...t.rows].sort((a, b) => {
      const ff = String(a.field_family ?? '').localeCompare(String(b.field_family ?? ''));
      if (ff !== 0) return ff;
      return String(a.harness ?? '').localeCompare(String(b.harness ?? ''));
    });
    const ths = SHOW_COLS.map(h => `<th>${esc(COL_LABELS[h] ?? h)}</th>`).join('');
    const trs = sorted.map(row => {
      const harness = row.harness ?? '';
      const fam     = harnessToFamily[harness] ?? '';
      const archFg  = fg(fam);
      const cells = SHOW_COLS.map(h => {
        if (h === 'harness') {
          return `<td><span style="color:${archFg};font-weight:700">&bull;</span> ${esc(harness)}</td>`;
        }
        const v = row[h];
        if (['exact_label_accuracy', 'monthly_rate_accuracy_tolerance_15pct', 'pragmatic_macro_f1', 'purist_macro_f1'].includes(h)) {
          return `<td>${fmtPct(v)}</td>`;
        }
        return `<td>${esc(v ?? '—')}</td>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<div class="data-table-wrap"><table class="data-table"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
  }

  /* ── Tab 2: Anchor Comparison ── */
  function renderAnchorComparison() {
    const t = tables.seizure_frequency_anchor;
    if (!t || !t.rows?.length) return `<div class="empty">No seizure_frequency_anchor.csv data found.</div>`;
    const SHOW_COLS = ['model', 'harness', 'dataset_n', 'exact_label_accuracy', 'monthly_rate_accuracy_tolerance_15pct', 'pragmatic_macro_f1'];
    const COL_LABELS = {
      model: 'Model', harness: 'Harness', dataset_n: 'N',
      exact_label_accuracy: 'Exact Acc', monthly_rate_accuracy_tolerance_15pct: 'Monthly Rate Acc (±15%)',
      pragmatic_macro_f1: 'Pragmatic F1',
    };
    // Filter to only the columns that exist
    const availCols = SHOW_COLS.filter(c => t.headers.includes(c));
    const ths = availCols.map(h => `<th>${esc(COL_LABELS[h] ?? h)}</th>`).join('');
    const trs = t.rows.map(row => {
      const cells = availCols.map(h => {
        const v = row[h];
        if (['exact_label_accuracy', 'monthly_rate_accuracy_tolerance_15pct', 'pragmatic_macro_f1'].includes(h)) {
          return `<td>${fmtPct(v)}</td>`;
        }
        if (h === 'harness') {
          const fam = harnessToFamily[v ?? ''] ?? (row.architecture_family ?? '');
          return `<td><span style="color:${fg(fam)};font-weight:700">&bull;</span> ${esc(v ?? '—')}</td>`;
        }
        return `<td>${esc(v ?? '—')}</td>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<div class="data-table-wrap"><table class="data-table"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
  }

  /* ── Tab 3: Self-Consistency Cost ── */
  function renderSelfConsistency() {
    const t = tables.self_consistency_cost;
    if (!t || !t.rows?.length) return `<div class="empty">No self_consistency_cost.csv data found.</div>`;
    const maxTok = Math.max(...t.rows.map(r => Number(r.mean_total_tokens ?? 0)).filter(v => !isNaN(v)), 1);
    const ths = t.headers.map(h => `<th>${esc(h.replace(/_/g,' '))}</th>`).join('');
    const trs = t.rows.map(row => {
      const cells = t.headers.map(h => {
        const v = row[h];
        if (h === 'mean_total_tokens') {
          return `<td class="tok-cell">${tokBar(v, maxTok)}</td>`;
        }
        if (['exact_label_accuracy', 'monthly_rate_accuracy_tolerance_15pct'].includes(h)) {
          return `<td>${fmtPct(v)}</td>`;
        }
        return `<td>${esc(v ?? '—')}</td>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<div class="data-table-wrap"><table class="data-table"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
  }

  /* ── Tab 4: Budget (filtered to display_register) ── */
  function renderBudgetFiltered() {
    const t = tables.budget_complexity;
    if (!t || !t.rows?.length) return `<div class="empty">No budget_complexity.csv data found.</div>`;
    const displayIds = new Set(display.map(r => r.run_id));
    const filtered = t.rows.filter(row => displayIds.has(row.run_id));
    if (!filtered.length) return `<div class="empty">No budget rows match display register run IDs.</div>`;
    const SHOW_COLS = ['run_id', 'architecture_family', 'llm_calls_per_row', 'mean_total_tokens', 'latency_ms', 'estimated_cost_usd'];
    const COL_LABELS = {
      run_id: 'Run ID', architecture_family: 'Architecture', llm_calls_per_row: 'LLM Calls/Row',
      mean_total_tokens: 'Mean Tokens', latency_ms: 'Latency (ms)', estimated_cost_usd: 'Est. Cost (USD)',
    };
    const availCols = SHOW_COLS.filter(c => t.headers.includes(c));
    const maxTok = Math.max(...filtered.map(r => Number(r.mean_total_tokens ?? 0)).filter(v => !isNaN(v)), 1);
    const maxLat = Math.max(...filtered.map(r => Number(r.latency_ms ?? 0)).filter(v => !isNaN(v)), 1);
    const ths = availCols.map(h => `<th>${esc(COL_LABELS[h] ?? h)}</th>`).join('');
    const trs = filtered.map(row => {
      const cells = availCols.map(h => {
        const v = row[h];
        if (h === 'run_id') {
          const short = String(v ?? '').length > 36 ? String(v).slice(0, 33) + '...' : String(v ?? '');
          return `<td><span style="font-family:var(--mono);font-size:10px">${esc(short)}</span></td>`;
        }
        if (h === 'architecture_family') {
          const fam = v ?? '';
          return `<td><span style="color:${fg(fam)};font-weight:700">&bull;</span> ${esc(familyLabel(fam))}</td>`;
        }
        if (h === 'mean_total_tokens') {
          return `<td class="tok-cell">${tokBar(v, maxTok)}</td>`;
        }
        if (h === 'latency_ms') {
          return `<td class="tok-cell">${tokBar(v, maxLat, true)}</td>`;
        }
        return `<td>${esc(v ?? '—')}</td>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<div class="data-table-wrap"><table class="data-table"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
  }

  const tabNav = `
<div class="tab-nav">
  <button class="tab-btn active" data-tab="field-accuracy" onclick="switchTab('result-tables-wrap','field-accuracy')">Field Accuracy</button>
  <button class="tab-btn" data-tab="anchor" onclick="switchTab('result-tables-wrap','anchor')">Anchor Comparison</button>
  <button class="tab-btn" data-tab="sc" onclick="switchTab('result-tables-wrap','sc')">Self-Consistency</button>
  <button class="tab-btn" data-tab="budget" onclick="switchTab('result-tables-wrap','budget')">Budget</button>
</div>`;

  const tabPanes = `
<div class="tab-pane active" data-tab="field-accuracy">${renderFieldAccuracy()}</div>
<div class="tab-pane" data-tab="anchor">${renderAnchorComparison()}</div>
<div class="tab-pane" data-tab="sc">${renderSelfConsistency()}</div>
<div class="tab-pane" data-tab="budget">${renderBudgetFiltered()}</div>`;

  return `
<div class="s-banner" id="result-tables">
  <span class="s-banner-text">${IC.chart}&nbsp; Result Tables</span>
</div>
<div id="result-tables-wrap">
  ${tabNav}
  ${tabPanes}
</div>`;
}

/* ── Model Registry ─────────────────────────────────── */

function renderModels(data) {
  const frozen = data.model_registry?.frozen ?? {};
  const models = frozen.models ?? [];
  const frozenAt = frozen.frozen_at ? `Frozen ${fmtDateShort(frozen.frozen_at)}` : '';
  const src = frozen._source ? ` &mdash; ${esc(frozen._source)}` : '';

  if (models.length === 0) {
    return `
<div class="s-banner" id="models">
  <span class="s-banner-text">${IC.stack}&nbsp; Model Registry</span>
</div>
<div class="empty">No model registry found. Add config/model_registry.YYYY-MM-DD.yaml and re-generate.</div>`;
  }

  const groups = {};
  for (const m of models) { (groups[m.provider ?? 'other'] ??= []).push(m); }

  const sections = Object.entries(groups).map(([provider, ms]) => {
    const cards = ms.map(m => {
      const tierCls = `s-tier-${m.tier ?? 'small'}`;
      const costIn  = m.cost_per_1k_input  != null ? `in $${Number(m.cost_per_1k_input).toFixed(4)}/1k`  : '';
      const costOut = m.cost_per_1k_output != null ? `out $${Number(m.cost_per_1k_output).toFixed(4)}/1k` : '';
      const ctx     = m.context_window ? `${Math.round(m.context_window / 1000)}k ctx` : '';
      return `<div class="model-card">
        <div class="mc-top"><div class="mc-name">${esc(m.display_name)}</div><span class="stamp ${tierCls}">${esc(m.tier ?? '—')}</span></div>
        <div class="mc-id">${esc(m.model_id)}</div>
        <div class="mc-note">${esc(m.notes ?? '')}</div>
        <div class="mc-costs">${[costIn, costOut, ctx].filter(Boolean).join(' &nbsp;&middot;&nbsp; ')}</div>
      </div>`;
    }).join('');
    return `<div class="provider-hdg">${esc(provider)}</div><div class="model-grid">${cards}</div>`;
  }).join('');

  return `
<div class="s-banner" id="models">
  <span class="s-banner-text">${IC.stack}&nbsp; Model Registry</span>
</div>
<p style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:20px">${frozenAt}${src}</p>
${sections}`;
}

/* ── Research Documents ─────────────────────────────── */

function renderDocs(data) {
  const docs = data.docs ?? {};
  const LABELS = {
    research_question:       'Research Question & Hypotheses',
    architecture:            'Architecture & Harness Descriptions',
    coding_agent_harness_literature_review: 'Coding-Agent Harness Literature Review',
    evaluation_contract:     'Evaluation Contract',
    adjudication_protocol:   'Adjudication Protocol',
    experiment_protocol:     'Experiment Protocol',
    model_registry_protocol: 'Model Registry Protocol',
    implementation_plan:     'Implementation Plan',
  };
  const cards = Object.entries(LABELS).map(([key, label]) => {
    const txt    = docs[key];
    const loaded = txt && txt.trim().length > 0;
    const words  = loaded ? Math.round(txt.trim().split(/\s+/).length).toLocaleString('en-GB') + ' words' : 'not loaded';
    const body   = loaded
      ? `<div class="doc-text">${esc(txt)}</div>`
      : `<div class="empty" style="padding:16px 0">Document not found.</div>`;
    return `<div class="doc-card">
      <div class="doc-trigger" onclick="this.closest('.doc-card').classList.toggle('open')">
        <span class="doc-hed">${esc(label)}</span>
        <span class="doc-meta">${esc(words)}</span>
      </div>
      <div class="doc-body">${body}</div>
    </div>`;
  }).join('');

  return `
<div class="s-banner-ed" id="docs">
  <div class="s-banner-text">Research Documents</div>
  <div class="s-banner-sub">${IC.book}&nbsp; Primary Sources &nbsp;&middot;&nbsp; Eight Volumes</div>
</div>
<div>${cards}</div>`;
}

/* ── Boot ───────────────────────────────────────────── */

async function boot() {
  const loading = document.getElementById('loading');
  const err     = document.getElementById('err');
  const cockpit = document.getElementById('cockpit');

  let data;
  try {
    const r = await fetch('./cockpit-data.json');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    data = await r.json();
  } catch {
    loading.style.display = 'none';
    err.style.display = 'block';
    return;
  }

  initColors(data.architecture_ladder ?? []);

  loading.style.display = 'none';
  cockpit.style.display = 'block';
  cockpit.innerHTML = [
    renderMasthead(data),
    renderFront(data),
    renderLadder(data),
    renderFamilyRegister(data),
    renderResultTables(data),
    renderModels(data),
    renderDocs(data),
  ].join('\n');
}

boot();
</script>
</body>
</html>
